name: Test Alert Rules

on:
  push:
    paths:
      - 'recipes/alert_rules.rb'
      - 'spec/unit/recipes/alert_rules_spec.rb'
      - 'libraries/axonops*.rb'
      - '.github/workflows/test-alert-rules.yml'
  pull_request:
    paths:
      - 'recipes/alert_rules.rb'
      - 'spec/unit/recipes/alert_rules_spec.rb'
      - 'libraries/axonops*.rb'
      - '.github/workflows/test-alert-rules.yml'
  workflow_dispatch:

jobs:
  test-alert-rules:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.2'
        bundler-cache: false

    # The old approach (wget'ing a pinned chef-workstation .deb URL directly
    # from packages.chef.io) started returning "402 License validation
    # failed" — Chef tightened direct package-download licensing at some
    # point after this pin was added. omnitruck's install script is what
    # ci.yml/test.yml already use successfully throughout this repo's CI;
    # switched to it here for the same reason.
    - name: Install Chef Workstation
      run: |
        curl -L https://omnitruck.chef.io/install.sh | sudo bash -s -- -P chef-workstation -c stable
        echo 'eval "$(chef shell-init bash)"' >> ~/.bashrc
        source ~/.bashrc
        sudo env CHEF_LICENSE=accept-silent chef -v

    - name: Verify Chef installation
      run: |
        export CHEF_LICENSE=accept-silent
        export PATH=/opt/chef-workstation/bin:/opt/chef-workstation/embedded/bin:$PATH
        chef --version
        chef exec ruby --version

    - name: Install cookbook dependencies
      run: |
        export CHEF_LICENSE=accept-silent
        export PATH=/opt/chef-workstation/bin:/opt/chef-workstation/embedded/bin:$PATH
        chef exec bundle install || true
        chef exec berks install || true

    - name: Run alert_rules unit tests
      run: |
        export PATH=/opt/chef-workstation/bin:/opt/chef-workstation/embedded/bin:$PATH
        export CHEF_LICENSE=accept-silent
        chef exec rspec spec/unit/recipes/alert_rules_spec.rb --format documentation --color

    - name: Generate test report
      if: always()
      run: |
        export CHEF_LICENSE=accept-silent
        export PATH=/opt/chef-workstation/bin:/opt/chef-workstation/embedded/bin:$PATH
        chef exec rspec spec/unit/recipes/alert_rules_spec.rb --format html --out rspec_results.html || true

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          rspec_results.html
          coverage/
