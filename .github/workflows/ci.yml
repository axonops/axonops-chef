name: CI

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Fast, dependency-free gate: Ruby syntax, ERB template syntax, YAML validity.
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Ruby syntax (-c) for libraries, recipes, attributes, specs
        run: |
          find libraries recipes attributes spec -name '*.rb' -print0 \
            | xargs -0 -n1 ruby -c

      - name: ERB template syntax
        run: |
          rc=0
          while IFS= read -r -d '' f; do
            erb -P -x -T - "$f" | ruby -c >/dev/null || { echo "ERB syntax error: $f"; rc=1; }
          done < <(find templates -name '*.erb' -print0)
          exit $rc

      - name: YAML validity (kitchen.yml + workflows)
        run: |
          # kitchen.yml is an ERB template (driver name, per-platform docker
          # overrides) — render it the same way test-kitchen itself does
          # before parsing, otherwise this only validates the parts that
          # happen to also be valid raw YAML, not what test-kitchen actually
          # consumes.
          ruby -ryaml -rerb -e 'YAML.safe_load(ERB.new(File.read("kitchen.yml")).result)'
          KITCHEN_DRIVER=docker ruby -ryaml -rerb -e 'YAML.safe_load(ERB.new(File.read("kitchen.yml")).result)'
          for f in .github/workflows/*.yml; do ruby -ryaml -e "YAML.load_file('$f')"; done

  # Pure-Ruby unit specs for the version library and 3.11 template render.
  # No Chef converge required, so this is fast and reliable — the blocking gate
  # for the Cassandra version/templating logic.
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install RSpec
        run: gem install rspec --no-document

      - name: Unit specs (library + 3.11 template render)
        run: |
          rspec --options /dev/null \
            spec/unit/libraries/cassandra_version_spec.rb \
            spec/unit/templates/cassandra_3_11_yaml_spec.rb \
            --format documentation --color

  # ChefSpec recipe specs. Requires a full Chef + cookbook dependency resolve;
  # informational while the legacy recipe specs are brought up to date.
  chefspec:
    runs-on: ubuntu-latest
    env:
      CHEF_LICENSE: accept-silent
    steps:
      - uses: actions/checkout@v4

      - name: Install Chef Workstation
        run: curl -L https://omnitruck.chef.io/install.sh | sudo bash -s -- -P chef-workstation -c stable

      - name: Install cookbook dependencies
        run: |
          chef exec bundle install || true
          chef exec berks install || true

      - name: ChefSpec recipe specs
        run: chef exec rspec spec/unit/recipes --format documentation --color
        continue-on-error: true

  # Cookstyle lint — informational while the cookbook clears existing lint debt.
  cookstyle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install Cookstyle
        run: gem install cookstyle --no-document

      - name: Run Cookstyle
        run: cookstyle --display-cop-names --extra-details
        continue-on-error: true

  # Integration: Test Kitchen + dokken. Slow; run manually via "Run workflow".
  kitchen:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      CHEF_LICENSE: accept-silent
    strategy:
      fail-fast: false
      # cassandra-offline is deliberately not in this matrix: it needs
      # packages pre-staged under /opt/axonops/offline before it can
      # converge — see the kitchen-offline job below.
      matrix:
        suite: [ cassandra-3-11, cassandra-default ]
    steps:
      - uses: actions/checkout@v4

      - name: Install Chef Workstation
        run: curl -L https://omnitruck.chef.io/install.sh | sudo bash -s -- -P chef-workstation -c stable

      - name: kitchen test ${{ matrix.suite }}
        run: |
          export KITCHEN_YAML=kitchen.yml
          kitchen test "${{ matrix.suite }}" --destroy=always

  # Airgapped install integration test. Stages the real Apache Cassandra
  # tarball and a Zulu JDK 17 tarball into /opt/axonops/offline with network
  # access, then converges the cassandra-offline suite (agent disabled — see
  # kitchen.yml) to prove axonops.offline_install=true alone is enough,
  # including the java.rb offline-flag propagation fix. Slow; run manually.
  kitchen-offline:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      CHEF_LICENSE: accept-silent
    steps:
      - uses: actions/checkout@v4

      - name: Install Chef Workstation
        run: curl -L https://omnitruck.chef.io/install.sh | sudo bash -s -- -P chef-workstation -c stable

      - name: Stage offline packages (Cassandra + Java tarballs only — no AxonOps credentials needed)
        run: |
          set -euo pipefail
          STAGE_DIR=/opt/axonops/offline
          sudo mkdir -p "$STAGE_DIR"

          # Apache Cassandra tarball — same URL axonops::cassandra builds online.
          sudo curl -fL "https://archive.apache.org/dist/cassandra/5.0.5/apache-cassandra-5.0.5-bin.tar.gz" \
            -o "$STAGE_DIR/apache-cassandra-5.0.5-bin.tar.gz"

          # Latest standard (non-CRaC) Zulu JDK 17 tarball, resolved via Azul's
          # metadata API so we never hardcode a filename/version that goes
          # stale. java.rb's offline path globs `zulu*jdk*linux_x64.tar.gz`,
          # so any matching standard build works.
          JAVA_URL=$(curl -fsSL "https://api.azul.com/metadata/v1/zulu/packages/?java_version=17&os=linux&arch=x86&archive_type=tar.gz&java_package_type=jdk&javafx_bundled=false&latest=true&page_size=5" \
            | ruby -rjson -e 'pkgs = JSON.parse(STDIN.read); puts pkgs.reject { |p| p["download_url"].include?("crac") }.first["download_url"]')
          sudo curl -fL "$JAVA_URL" -o "$STAGE_DIR/$(basename "$JAVA_URL")"

      - name: kitchen test cassandra-offline
        run: |
          export KITCHEN_YAML=kitchen.yml
          kitchen test cassandra-offline --destroy=always
