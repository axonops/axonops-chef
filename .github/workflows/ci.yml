name: CI

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Fast, dependency-free gate: Ruby syntax, ERB template syntax, YAML validity.
  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Ruby syntax (-c) for libraries, recipes, attributes, specs
        run: |
          find libraries recipes attributes spec -name '*.rb' -print0 \
            | xargs -0 -n1 ruby -c

      - name: ERB template syntax
        run: |
          rc=0
          while IFS= read -r -d '' f; do
            erb -P -x -T - "$f" | ruby -c >/dev/null || { echo "ERB syntax error: $f"; rc=1; }
          done < <(find templates -name '*.erb' -print0)
          exit $rc

      - name: YAML validity (kitchen.yml + workflows)
        run: |
          ruby -ryaml -e 'YAML.load_file("kitchen.yml")'
          for f in .github/workflows/*.yml; do ruby -ryaml -e "YAML.load_file('$f')"; done

  # Unit tests: pure-Ruby library/template specs + ChefSpec recipe specs.
  unit:
    runs-on: ubuntu-latest
    env:
      CHEF_LICENSE: accept-silent
    steps:
      - uses: actions/checkout@v4

      - name: Install Chef Workstation
        run: |
          wget -q https://packages.chef.io/files/stable/chef-workstation/23.5.1040/ubuntu/22.04/chef-workstation_23.5.1040-1_amd64.deb
          sudo dpkg -i chef-workstation_23.5.1040-1_amd64.deb

      - name: Versions
        run: |
          export PATH=/opt/chef-workstation/bin:/opt/chef-workstation/embedded/bin:$PATH
          chef --version
          chef exec ruby --version

      - name: Install cookbook dependencies
        run: |
          export PATH=/opt/chef-workstation/bin:/opt/chef-workstation/embedded/bin:$PATH
          chef exec bundle install || true
          chef exec berks install || true

      - name: Pure-Ruby unit specs (no Chef converge required)
        run: |
          export PATH=/opt/chef-workstation/bin:/opt/chef-workstation/embedded/bin:$PATH
          chef exec rspec --options /dev/null \
            spec/unit/libraries/cassandra_version_spec.rb \
            spec/unit/templates/cassandra_3_11_yaml_spec.rb \
            --format documentation --color

      - name: ChefSpec recipe specs
        run: |
          export PATH=/opt/chef-workstation/bin:/opt/chef-workstation/embedded/bin:$PATH
          chef exec rspec spec/unit/recipes --format documentation --color

  # Cookstyle lint — informational while the cookbook clears existing lint debt.
  cookstyle:
    runs-on: ubuntu-latest
    env:
      CHEF_LICENSE: accept-silent
    steps:
      - uses: actions/checkout@v4

      - name: Install Chef Workstation
        run: |
          wget -q https://packages.chef.io/files/stable/chef-workstation/23.5.1040/ubuntu/22.04/chef-workstation_23.5.1040-1_amd64.deb
          sudo dpkg -i chef-workstation_23.5.1040-1_amd64.deb

      - name: Run Cookstyle
        run: |
          export PATH=/opt/chef-workstation/bin:/opt/chef-workstation/embedded/bin:$PATH
          chef exec cookstyle --display-cop-names --extra-details
        continue-on-error: true

  # Integration: Test Kitchen + dokken. Slow; run manually via "Run workflow".
  kitchen:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      CHEF_LICENSE: accept-silent
    strategy:
      fail-fast: false
      matrix:
        suite: [ cassandra-3-11, cassandra-default ]
    steps:
      - uses: actions/checkout@v4

      - name: Install Chef Workstation
        run: |
          wget -q https://packages.chef.io/files/stable/chef-workstation/23.5.1040/ubuntu/22.04/chef-workstation_23.5.1040-1_amd64.deb
          sudo dpkg -i chef-workstation_23.5.1040-1_amd64.deb

      - name: kitchen test ${{ matrix.suite }}
        run: |
          export PATH=/opt/chef-workstation/bin:/opt/chef-workstation/embedded/bin:$PATH
          export KITCHEN_YAML=kitchen.yml
          kitchen test "${{ matrix.suite }}" --destroy=always
