---
driver:
  name: <%= ENV.fetch('KITCHEN_DRIVER', 'vagrant') %>

provisioner:
  name: chef_zero
  chef_license: accept-no-persist

verifier:
  name: inspec

platforms:
  - name: ubuntu-22.04
  - name: rockylinux-9

suites:
  - name: cassandra-311-tar
    run_list:
      - recipe[axonops::cassandra]
    verifier:
      inspec_tests:
        - test/integration/cassandra
    attributes:
      axonops:
        cassandra:
          version: '3.11.17'
          install_format: 'tar'
          start_on_install: false
          wait_for_start: false

  - name: cassandra-311-tar-rhel
    run_list:
      - recipe[axonops::cassandra]
    verifier:
      inspec_tests:
        - test/integration/cassandra
    includes:
      - rockylinux-9
    attributes:
      axonops:
        cassandra:
          version: '3.11.17'
          install_format: 'tar'
          start_on_install: false
          wait_for_start: false

  - name: cassandra-41-tar
    run_list:
      - recipe[axonops::cassandra]
    verifier:
      inspec_tests:
        - test/integration/cassandra
    attributes:
      axonops:
        cassandra:
          version: '4.1.7'
          install_format: 'tar'
          start_on_install: false
          wait_for_start: false

  - name: cassandra-50-default
    run_list:
      - recipe[axonops::cassandra]
    verifier:
      inspec_tests:
        - test/integration/cassandra
    attributes:
      axonops:
        cassandra:
          version: '5.0.5'
          install_format: 'tar'
          start_on_install: false
          wait_for_start: false

  - name: cassandra-50-pkg-debian
    run_list:
      - recipe[axonops::cassandra]
    verifier:
      inspec_tests:
        - test/integration/cassandra
    includes:
      - ubuntu-22.04
    attributes:
      axonops:
        cassandra:
          version: '5.0.5'
          install_format: 'pkg'
          start_on_install: false
          wait_for_start: false

  - name: cassandra-50-g1gc
    run_list:
      - recipe[axonops::cassandra]
    verifier:
      inspec_tests:
        - test/integration/cassandra
    attributes:
      axonops:
        cassandra:
          version: '5.0.5'
          install_format: 'tar'
          gc_type: 'G1GC'
          start_on_install: false
          wait_for_start: false

  - name: cassandra-50-shenandoah
    run_list:
      - recipe[axonops::cassandra]
    verifier:
      inspec_tests:
        - test/integration/cassandra
    attributes:
      axonops:
        cassandra:
          version: '5.0.5'
          install_format: 'tar'
          gc_type: 'Shenandoah'
          start_on_install: false
          wait_for_start: false

  - name: cassandra-41-pem-tls
    run_list:
      - recipe[axonops::cassandra]
    verifier:
      inspec_tests:
        - test/integration/cassandra
    attributes:
      axonops:
        cassandra:
          version: '4.1.7'
          install_format: 'tar'
          tls:
            internode_encryption: 'all'
            type: 'pem'
          start_on_install: false
          wait_for_start: false

  - name: cassandra-50-jks-tls
    run_list:
      - recipe[axonops::cassandra]
    verifier:
      inspec_tests:
        - test/integration/cassandra
    attributes:
      axonops:
        cassandra:
          version: '5.0.5'
          install_format: 'tar'
          tls:
            internode_encryption: 'all'
            type: 'jks'
          start_on_install: false
          wait_for_start: false
