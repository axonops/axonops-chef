---
# Test Kitchen configuration for the axonops cookbook (Cassandra suites).
# Uses the dokken driver so systemd-managed services run inside containers.
#
#   kitchen converge cassandra-3-11-ubuntu-2204
#   kitchen verify   cassandra-default-rockylinux-9
#
driver:
  name: dokken
  privileged: true
  chef_version: '18'

transport:
  name: dokken

provisioner:
  name: dokken
  # Render the run list deterministically; do not auto-start clusters on first
  # converge unless the suite asks for it.
  chef_license: accept-no-persist

verifier:
  name: inspec

platforms:
  - name: ubuntu-22.04
    driver:
      image: dokken/ubuntu-22.04
      pid_one_command: /bin/systemd
  - name: rockylinux-9
    driver:
      image: dokken/rockylinux-9
      pid_one_command: /usr/lib/systemd/systemd

suites:
  - name: cassandra-3-11
    run_list:
      - recipe[axonops::cassandra]
    verifier:
      inspec_tests:
        - test/integration/cassandra-3.11
    attributes:
      axonops:
        cassandra:
          version: '3.11.17'
          start_on_boot: true
          wait_for_start: true

  - name: cassandra-default
    run_list:
      - recipe[axonops::cassandra]
    verifier:
      inspec_tests:
        - test/integration/cassandra-default
    attributes:
      axonops:
        cassandra:
          version: '5.0.5'
          start_on_boot: true
          wait_for_start: true

  # Airgapped install path: axonops.offline_install=true must be sufficient on
  # its own (including for the java.rb -> java.offline_install propagation) to
  # install Cassandra + the agent with zero network egress. This suite
  # requires the real Cassandra tarball, Java (Zulu) package, agent package,
  # and java-agent package to be pre-staged under /opt/axonops/offline on the
  # target image/container before `kitchen converge` runs (e.g. baked into a
  # custom dokken image, or copied in via a CI step) — kitchen itself does not
  # fetch or provide these binaries.
  - name: cassandra-offline
    run_list:
      - recipe[axonops::cassandra]
    verifier:
      inspec_tests:
        - test/integration/cassandra-default
    attributes:
      axonops:
        offline_install: true
        offline_packages_path: '/opt/axonops/offline'
        cassandra:
          version: '5.0.5'
          start_on_boot: true
          wait_for_start: true
