---
driver:
  name: <%= ENV.fetch('KITCHEN_DRIVER', 'vagrant') %>

provisioner:
  name: chef_zero
  chef_license: accept-no-persist

verifier:
  name: inspec

platforms:
  # AxonOps packages call systemctl in their postinst scripts. kitchen-docker
  # runs `sshd -D` as PID 1 by default (no real init system at all), so those
  # calls fail hard: "Failed to connect to bus: Host is down". The
  # axonops-systemd-* images (built by test.yml before `kitchen test`, from
  # test/docker/Dockerfile.systemd-*) add systemd on top of the stock
  # ubuntu/rockylinux base; overriding run_command to /sbin/init boots real
  # systemd as PID 1 instead, with privileged mode + the cgroup/tmpfs mounts
  # systemd needs to run inside a container at all. Only meaningful for the
  # docker driver — vagrant (a real VM) already has a normal init system.
  - name: ubuntu-22.04
    driver:
      <% if ENV.fetch('KITCHEN_DRIVER', 'vagrant') == 'docker' %>
      image: axonops-systemd-ubuntu-2204
      run_command: /sbin/init
      privileged: true
      run_options: --cgroupns=host -v /sys/fs/cgroup:/sys/fs/cgroup:rw --tmpfs /run --tmpfs /run/lock
      <% end %>
  - name: ubuntu-24.04
    driver:
      <% if ENV.fetch('KITCHEN_DRIVER', 'vagrant') == 'docker' %>
      image: axonops-systemd-ubuntu-2404
      run_command: /sbin/init
      privileged: true
      run_options: --cgroupns=host -v /sys/fs/cgroup:/sys/fs/cgroup:rw --tmpfs /run --tmpfs /run/lock
      <% end %>
  - name: rockylinux-9
    driver:
      <% if ENV.fetch('KITCHEN_DRIVER', 'vagrant') == 'docker' %>
      image: axonops-systemd-rockylinux-9
      run_command: /sbin/init
      privileged: true
      run_options: --cgroupns=host -v /sys/fs/cgroup:/sys/fs/cgroup:rw --tmpfs /run --tmpfs /run/lock
      <% end %>

suites:
  - name: cassandra-311-tar
    # ubuntu-24.04 exists only for the cqlsh-venv suite; keep this suite on the
    # 22.04/rocky images the tar/311 CI jobs build.
    excludes:
      - ubuntu-24.04
    run_list:
      - recipe[axonops::cassandra]
    verifier:
      inspec_tests:
        - test/integration/cassandra
    attributes:
      axonops:
        cassandra:
          version: '3.11.17'
          install_format: 'tar'
          start_on_install: false
          wait_for_start: false

  - name: cassandra-311-tar-rhel
    run_list:
      - recipe[axonops::cassandra]
    verifier:
      inspec_tests:
        - test/integration/cassandra
    includes:
      - rockylinux-9
    attributes:
      axonops:
        cassandra:
          version: '3.11.17'
          install_format: 'tar'
          start_on_install: false
          wait_for_start: false

  - name: cassandra-41-tar
    # ubuntu-24.04 exists only for the cqlsh-venv suite; keep this suite on the
    # 22.04/rocky images the tar/311 CI jobs build.
    excludes:
