          install_format: 'pkg'
          start_on_install: false
          wait_for_start: false

  # Exercises the cqlsh virtualenv on the distro that actually breaks the
  # bundled cqlsh — Ubuntu 24.04 ships Python 3.12, which removed asyncore/imp.
  - name: cassandra-50-cqlsh-venv-ubuntu-2404
    run_list:
